<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="referrer" content="no-referrer">
  <title>Slash English Coach</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: light-dark(#f7fbff, #151719);
      --panel: light-dark(#ffffff, #202327);
      --panel-soft: light-dark(#eef7ff, #26313a);
      --text: light-dark(#18202a, #f5f7fa);
      --muted: light-dark(#607083, #a9b3bd);
      --primary: light-dark(#1f7ae0, #74b7ff);
      --primary-contrast: light-dark(#ffffff, #102033);
      --accent: light-dark(#ffb020, #ffd166);
      --good: light-dark(#188a4b, #5dd58c);
      --bad: light-dark(#c2410c, #ff9a68);
      --border: light-dark(#d8e2ec, #37424d);
      --shadow: 0 10px 30px rgb(18 38 63 / 10%);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); }
    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }
    .app { width: min(1180px, calc(100vw - 24px)); margin: 0 auto; padding: 18px 0 28px; }
    .top { display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: start; margin-bottom: 12px; }
    .brand { display: flex; gap: 12px; align-items: center; }
    .logo { width: 44px; height: 44px; border-radius: 12px; display: grid; place-items: center; background: var(--primary); color: var(--primary-contrast); font-weight: 800; }
    h1, h2, h3, p { margin: 0; }
    h1 { font-size: clamp(24px, 3vw, 38px); line-height: 1.12; }
    h2 { font-size: 24px; margin-bottom: 8px; }
    h3 { font-size: 18px; margin-bottom: 6px; }
    .muted { color: var(--muted); }
    .top-actions, .actions, .row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .btn { border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; background: var(--panel); color: var(--text); min-height: 38px; }
    .btn:hover { border-color: var(--primary); }
    .btn-primary { background: var(--primary); color: var(--primary-contrast); border-color: var(--primary); font-weight: 700; }
    .btn-soft { background: var(--panel-soft); }
    .btn-icon { display: inline-flex; gap: 6px; align-items: center; }
    .tabs { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; margin: 14px 0; }
    .tab { display: flex; justify-content: center; gap: 8px; align-items: center; padding: 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--panel); color: var(--text); font-weight: 700; }
    .tab[aria-pressed="true"] { border-color: var(--primary); background: var(--primary); color: var(--primary-contrast); }
    .badges { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .badge { border: 1px solid var(--border); border-radius: 999px; padding: 5px 9px; background: var(--panel); color: var(--muted); font-size: 13px; }
    .layout { display: grid; grid-template-columns: 260px 1fr; gap: 14px; align-items: start; }
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; box-shadow: var(--shadow); padding: 16px; }
    .nav { display: grid; gap: 7px; }
    .step { display: grid; grid-template-columns: 28px 1fr; gap: 8px; align-items: center; width: 100%; text-align: left; border: 1px solid transparent; border-radius: 8px; padding: 10px; background: transparent; color: var(--text); }
    .step small { display: block; color: var(--muted); font-size: 12px; }
    .step[aria-current="step"] { background: var(--panel-soft); border-color: var(--primary); }
    .step-num { width: 28px; height: 28px; border-radius: 8px; display: grid; place-items: center; background: var(--panel-soft); color: var(--primary); font-weight: 800; }
    .progress { height: 8px; border-radius: 999px; overflow: hidden; background: var(--panel-soft); margin: 12px 0 0; }
    .progress span { display: block; height: 100%; width: 0; background: linear-gradient(90deg, var(--primary), var(--accent)); transition: width .2s ease; }
    .panel { min-height: 520px; }
    .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .choice-grid, .reading-levels, .review-list { display: grid; gap: 10px; margin-top: 12px; }
    label.choice { display: flex; gap: 10px; align-items: flex-start; padding: 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--panel); }
    label.choice:has(input:checked) { border-color: var(--primary); background: var(--panel-soft); }
    .field { display: grid; gap: 6px; font-weight: 700; }
    .field span { color: var(--muted); font-weight: 500; font-size: 13px; }
    .control { width: 100%; min-height: 40px; border: 1px solid var(--border); border-radius: 8px; padding: 9px 10px; color: var(--text); background: var(--panel); }
    textarea.control { min-height: 120px; resize: vertical; }
    .sentence { font-size: 20px; line-height: 1.65; margin: 10px 0; }
    .translation { color: var(--muted); margin-top: -6px; }
    .vocab { display: flex; flex-wrap: wrap; gap: 8px; margin: 14px 0; }
    .feedback { margin-top: 14px; padding: 12px; border-left: 4px solid var(--primary); background: var(--panel-soft); border-radius: 8px; }
    .feedback.error { border-left-color: var(--bad); }
    .stars { color: var(--accent); font-size: 26px; letter-spacing: 2px; }
    .score-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; margin: 14px 0; }
    .score { border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
    .score strong { display: block; font-size: 28px; margin-top: 4px; }
    .history { display: flex; gap: 6px; align-items: end; min-height: 86px; margin-top: 10px; }
    .bar { flex: 1; min-width: 16px; display: grid; align-content: end; gap: 4px; text-align: center; color: var(--muted); font-size: 11px; }
    .bar span { display: block; height: var(--h); min-height: 4px; border-radius: 6px 6px 2px 2px; background: var(--primary); }
    .hidden { display: none !important; }
    .kid .panel { background: light-dark(#fffef7, #222323); }
    .kid .sentence { font-size: 24px; }
    .kid .btn, .kid .tab, .kid .step { min-height: 44px; }
    @media (max-width: 760px) {
      .top { grid-template-columns: 1fr; }
      .layout { grid-template-columns: 1fr; }
      .grid, .score-grid { grid-template-columns: 1fr; }
      .nav { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <main id="app" class="app">
    <header class="top">
      <div>
        <div class="brand">
          <div class="logo">/E</div>
          <div>
            <h1>Slash English Coach</h1>
            <p class="muted" id="subtitle">成人英语听说读写训练</p>
          </div>
        </div>
        <div class="badges">
          <span class="badge" id="modeBadge">成人模式</span>
          <span class="badge" id="levelBadge">待测评</span>
          <span class="badge" id="streakBadge">连续 0 天</span>
          <span class="badge" id="timeBadge">20 分钟</span>
          <span class="badge" id="aiBadge">AI 检测中</span>
        </div>
      </div>
      <div class="top-actions">
        <button class="btn btn-soft" data-action="review">复习 <span id="reviewCount">0</span></button>
        <button class="btn btn-soft" data-action="material">自定义材料</button>
        <button class="btn btn-soft" data-action="settings">设置</button>
      </div>
    </header>

    <div class="tabs" aria-label="学习模式">
      <button class="tab" data-action="set-mode" data-mode="kid" aria-pressed="false">儿童模式</button>
      <button class="tab" data-action="set-mode" data-mode="adult" aria-pressed="true">成人模式</button>
    </div>

    <section class="layout">
      <aside class="card">
        <nav class="nav" aria-label="训练流程" id="steps"></nav>
        <div class="progress" aria-label="今日进度"><span id="progress"></span></div>
      </aside>
      <section class="card panel" id="panel" aria-live="polite"></section>
    </section>
  </main>

  <script>
    (function () {
      var STORAGE_KEY = "slash-english-coach";
      var root = document.getElementById("app");
      var panel = document.getElementById("panel");
      var adultSteps = [
        ["听", "先听后看"], ["阅读挑战", "理解原文"], ["跟读", "逐句练习"], ["说", "口语复述"], ["写", "英文输出"], ["报告", "学习记录"]
      ];
      var kidSteps = [
        ["测一测", "零基础也可以"], ["阅读挑战", "读一读选一选"], ["跟读", "跟我说"], ["小表达", "说一句"], ["小书写", "写一写"], ["星星报告", "保存奖励"]
      ];
      var adultLessons = [
        {
          mode: "adult", topic: "商务沟通", title: "Introduce your AI service", level: "A2 入门",
          sentences: ["Our team helps companies use AI in their daily work.", "We begin with one real business problem and build a small solution.", "After the first result, we improve the system and train the team."],
          translations: ["我们的团队帮助企业在日常工作中使用 AI。", "我们从一个真实业务问题开始，并构建一个小方案。", "得到第一个结果后，我们改进系统并培训团队。"],
          vocab: [["daily work", "日常工作", "AI can improve our daily work."], ["business problem", "业务问题", "Start with a clear business problem."], ["improve", "改进", "We improve the system every week."], ["train", "培训", "We train the sales team."]],
          questions: [["What does the team help companies use?", ["AI", "New offices", "More cars"], 0], ["What do they begin with?", ["A real business problem", "A long course", "A new office"], 0], ["What happens after the first result?", ["They improve and train", "They stop", "They change company"], 0]],
          speakPrompt: "How does the team help a company?", keywords: ["AI", "business", "problem", "solution", "train"],
          writePrompt: "Write 50-100 words to introduce your own AI service to a potential client."
        },
        {
          mode: "adult", topic: "外贸询盘", title: "Reply to a product inquiry", level: "A2 入门",
          sentences: ["Thank you for your inquiry about our dry mix mortar.", "Please tell us your required quantity, destination port, and packaging needs.", "We can then recommend the right product and prepare a quotation."],
          translations: ["感谢您咨询我们的干混砂浆。", "请告诉我们所需数量、目的港和包装需求。", "然后我们可以推荐合适产品并准备报价。"],
          vocab: [["inquiry", "询盘", "We received a new inquiry."], ["quantity", "数量", "Please confirm the quantity."], ["destination port", "目的港", "Which destination port do you use?"], ["quotation", "报价", "We will send a quotation today."]],
          questions: [["What product is the inquiry about?", ["Dry mix mortar", "Cars", "Software"], 0], ["Which detail is requested?", ["Destination port", "Employee age", "Office size"], 0], ["What will the supplier prepare?", ["A quotation", "A meeting room", "A uniform"], 0]],
          speakPrompt: "What information should you ask from an overseas buyer?", keywords: ["inquiry", "quantity", "port", "packaging", "quotation"],
          writePrompt: "Write a short reply to a buyer who asks for your product price."
        },
        {
          mode: "adult", topic: "销售沟通", title: "Discover the client's real need", level: "A2+ 进阶",
          sentences: ["A good sales conversation begins with questions, not a product presentation.", "Ask the client what is difficult, what result they expect, and when they need it.", "Listen carefully before you recommend the next step."],
          translations: ["好的销售沟通从提问开始，而不是产品介绍。", "询问客户哪里困难、期待什么结果、什么时候需要。", "在推荐下一步之前要认真倾听。"],
          vocab: [["conversation", "对话", "Start a useful conversation."], ["expect", "期待", "What result do you expect?"], ["carefully", "认真地", "Listen carefully."], ["recommend", "推荐", "We recommend a small pilot."]],
          questions: [["What should start a sales conversation?", ["Questions", "A discount", "A long slide deck"], 0], ["What should you ask about?", ["Expected result", "Weather only", "Favorite color"], 0], ["What should happen before a recommendation?", ["Careful listening", "Immediate payment", "A new logo"], 0]],
          speakPrompt: "How would you discover a client's real need?", keywords: ["questions", "client", "difficult", "result", "listen"],
          writePrompt: "Write five useful questions you can ask a new business client."
        },
        {
          mode: "adult", topic: "项目汇报", title: "Report a small project result", level: "B1 初级",
          sentences: ["We tested the new workflow with five sales employees for one week.", "The average time needed to prepare a client report fell by thirty percent.", "Next, we will test accuracy and expand the pilot to another team."],
          translations: ["我们和五名销售员工测试了新流程一周。", "准备客户报告的平均时间下降了百分之三十。", "接下来我们会测试准确性，并把试点扩展到另一个团队。"],
          vocab: [["workflow", "工作流程", "The workflow saves time."], ["average", "平均", "The average time fell."], ["accuracy", "准确性", "We need to test accuracy."], ["expand", "扩大", "We will expand the pilot."]],
          questions: [["How many employees joined?", ["Five", "Three", "Ten"], 0], ["What fell by thirty percent?", ["Report preparation time", "Sales revenue", "Team size"], 0], ["What will they test next?", ["Accuracy", "Office rent", "A new uniform"], 0]],
          speakPrompt: "What was tested, what changed, and what happens next?", keywords: ["tested", "employees", "time", "percent", "accuracy", "expand"],
          writePrompt: "Write a short project update with one result and one next step."
        }
      ];
      var kidLevels = [
        {
          mode: "kid", kidLevel: 0, topic: "颜色和动物", title: "Level 0: I See a Cat", level: "儿童 Level 0 零基础",
          sentences: ["cat", "dog", "I see a cat.", "I see a dog."],
          translations: ["猫", "狗", "我看见一只猫。", "我看见一只狗。"],
          vocab: [["cat", "猫", "I see a cat."], ["dog", "狗", "I see a dog."], ["see", "看见", "I see a dog."], ["I", "我", "I see a cat."]],
          questions: [["Which word means 猫?", ["cat", "dog", "sun"], 0], ["I see a ___.", ["cat", "blue", "run"], 0], ["Which sentence says 我看见一只狗?", ["I see a dog.", "I am a dog.", "Dog see I."], 0]],
          speakPrompt: "Say: I see a cat.", keywords: ["I", "see", "cat"],
          writePrompt: "Copy and write one sentence: I see a cat."
        },
        {
          mode: "kid", kidLevel: 1, topic: "我的玩具", title: "Level 1: My Red Ball", level: "儿童 Level 1 单词和短句",
          sentences: ["I have a red ball.", "The ball is small.", "I like my ball."],
          translations: ["我有一个红球。", "这个球很小。", "我喜欢我的球。"],
          vocab: [["red", "红色", "I have a red ball."], ["ball", "球", "The ball is small."], ["small", "小的", "The ball is small."], ["like", "喜欢", "I like my ball."]],
          questions: [["What color is the ball?", ["Red", "Green", "Black"], 0], ["The ball is ___.", ["small", "tall", "cold"], 0], ["Who likes the ball?", ["I", "Dad", "A bird"], 0]],
          speakPrompt: "Say one sentence about your toy.", keywords: ["I", "have", "like", "ball"],
          writePrompt: "Write two short sentences about a toy."
        },
        {
          mode: "kid", kidLevel: 2, topic: "公园故事", title: "Level 2: Tom in the Park", level: "儿童 Level 2 简单故事",
          sentences: ["Tom goes to the park.", "He sees a big tree.", "A little bird sings in the tree.", "Tom smiles and says hello."],
          translations: ["Tom 去公园。", "他看见一棵大树。", "一只小鸟在树上唱歌。", "Tom 微笑并说你好。"],
          vocab: [["park", "公园", "Tom goes to the park."], ["tree", "树", "He sees a big tree."], ["bird", "鸟", "A little bird sings."], ["hello", "你好", "Tom says hello."]],
          questions: [["Where does Tom go?", ["The park", "The shop", "The sea"], 0], ["What is in the tree?", ["A bird", "A ball", "A bag"], 0], ["How does Tom feel?", ["Happy", "Angry", "Sleepy"], 0]],
          speakPrompt: "Tell the story in two easy sentences.", keywords: ["Tom", "park", "tree", "bird", "hello"],
          writePrompt: "Write three easy sentences about Tom."
        },
        {
          mode: "kid", kidLevel: 3, topic: "短文阅读", title: "Level 3: A Good Morning", level: "儿童 Level 3 简单短文",
          sentences: ["Mia gets up at seven.", "She eats bread and drinks milk.", "Then she reads a small book with her mother.", "Mia feels ready for school."],
          translations: ["Mia 七点起床。", "她吃面包、喝牛奶。", "然后她和妈妈读一本小书。", "Mia 觉得准备好去上学了。"],
          vocab: [["morning", "早晨", "It is a good morning."], ["bread", "面包", "She eats bread."], ["milk", "牛奶", "She drinks milk."], ["ready", "准备好的", "Mia feels ready."]],
          questions: [["When does Mia get up?", ["At seven", "At ten", "At one"], 0], ["What does Mia drink?", ["Milk", "Tea", "Juice"], 0], ["Who reads with Mia?", ["Her mother", "Her teacher", "Her friend"], 0]],
          speakPrompt: "Tell what Mia does in the morning.", keywords: ["Mia", "seven", "bread", "milk", "book", "school"],
          writePrompt: "Write four simple sentences about your morning."
        }
      ];
      var adultDiagnostic = [
        ["I ___ AI tools every day.", ["use", "uses", "using"], 0],
        ["Yesterday, we ___ a new workflow.", ["test", "tested", "testing"], 1],
        ["Which sentence is polite?", ["Could you please send your quotation?", "Send price now.", "You must send price."], 0],
        ["The pilot reduced report time by 30%. What happened?", ["Reports took less time.", "Reports became longer.", "The team stopped reporting."], 0],
        ["Choose the clearest sentence.", ["Real user feedback tells us what to improve next.", "Feedback real users next improve tells us.", "Users feedback next what real improve."], 0]
      ];
      var kidDiagnostic = [
        ["Choose A.", ["A", "B", "C"], 0],
        ["Which word is 猫?", ["cat", "run", "blue"], 0],
        ["I see a ___.", ["dog", "yes", "big"], 0],
        ["Which is a sentence?", ["I like milk.", "milk like", "the"], 0],
        ["Tom goes to the park. Where does Tom go?", ["Park", "Moon", "Bed"], 0]
      ];
      var saved = readSaved();
      var state = {
        mode: saved.mode || "adult",
        adultDay: clamp(Number(saved.adultDay) || 0, 0, adultLessons.length - 1),
        kidLevel: clamp(Number(saved.kidLevel) || 0, 0, kidLevels.length - 1),
        streak: Number(saved.streak) || 0,
        profile: saved.profile || null,
        step: 0,
        view: saved.profile ? "lesson" : "setup",
        question: 0,
        correct: 0,
        playCount: 0,
        shadowIndex: 0,
        shadowScores: [],
        showTranslation: false,
        scores: { listen: 0, read: 0, shadow: 0, speak: 0, write: 0 },
        reviewWords: Array.isArray(saved.reviewWords) ? saved.reviewWords : [],
        history: Array.isArray(saved.history) ? saved.history : [],
        customLesson: saved.customLesson || null,
        customActive: Boolean(saved.customActive && saved.customLesson),
        draftProfile: null,
        recording: false
      };
      function clamp(n, min, max) { return Math.max(min, Math.min(max, n)); }
      function readSaved() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); } catch (_) { return {}; } }
      function lesson() {
        if (state.customActive && state.customLesson) return state.customLesson;
        return state.mode === "kid" ? kidLevels[state.kidLevel] : adultLessons[state.adultDay];
      }
      function steps() { return state.mode === "kid" ? kidSteps : adultSteps; }
      function words(text) { return (String(text).toLowerCase().match(/[a-z']+/g) || []); }
      function unique(list) { return list.filter(function (v, i, a) { return a.indexOf(v) === i; }); }
      function escapeHTML(value) { return String(value == null ? "" : value).replace(/[&<>"']/g, function (c) { return { "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;" }[c]; }); }
      function persist() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
          mode: state.mode, adultDay: state.adultDay, kidLevel: state.kidLevel, streak: state.streak,
          profile: state.profile, reviewWords: state.reviewWords, history: state.history,
          customLesson: state.customLesson, customActive: state.customActive
        }));
      }
      function resetTraining() {
        state.step = 0; state.question = 0; state.correct = 0; state.playCount = 0; state.shadowIndex = 0; state.shadowScores = [];
        state.showTranslation = false; state.scores = { listen: 0, read: 0, shadow: 0, speak: 0, write: 0 };
      }
      function setMode(mode) {
        state.mode = mode;
        state.customActive = false;
        if (!state.profile || state.profile.mode !== mode) state.view = "setup";
        resetTraining(); persist(); render();
      }
      function saveSettings() {
        var goal = document.getElementById("goal") ? document.getElementById("goal").value : (state.mode === "kid" ? "分级阅读" : "综合提升");
        var minutes = document.getElementById("minutes") ? Number(document.getElementById("minutes").value) : (state.mode === "kid" ? 10 : 20);
        if (state.mode === "kid") {
          var selectedLevel = document.getElementById("kidLevelSelect") ? Number(document.getElementById("kidLevelSelect").value) : state.kidLevel;
          state.kidLevel = clamp(selectedLevel, 0, kidLevels.length - 1);
          state.profile = { mode: "kid", goal: goal, minutes: minutes, level: "儿童 Level " + state.kidLevel, diagnosticScore: state.profile ? state.profile.diagnosticScore : 0 };
        } else {
          state.profile = { mode: "adult", goal: goal, minutes: minutes, level: state.profile ? state.profile.level : "A2 入门", diagnosticScore: state.profile ? state.profile.diagnosticScore : 0 };
        }
        state.view = "lesson";
        resetTraining();
        persist();
        render();
      }
      function startAssessment() {
        state.draftProfile = {
          goal: document.getElementById("goal") ? document.getElementById("goal").value : (state.mode === "kid" ? "分级阅读" : "综合提升"),
          minutes: document.getElementById("minutes") ? Number(document.getElementById("minutes").value) : (state.mode === "kid" ? 10 : 20)
        };
        state.view = "assessment";
        render();
      }
      function addReviewWord(v, reason) {
        if (!v) return;
        var existing = state.reviewWords.find(function (item) { return item.word === v[0]; });
        if (existing) existing.seen = (existing.seen || 1) + 1;
        else state.reviewWords.push({ word: v[0], meaning: v[1], example: v[2], reason: reason, seen: 1 });
        persist();
      }
      function speak(text, rate) {
        if (!("speechSynthesis" in window)) { feedback("当前浏览器不支持语音播放，请使用最新版 Chrome 或 Edge。", true); return; }
        window.speechSynthesis.cancel();
        var u = new SpeechSynthesisUtterance(text);
        u.lang = "en-US"; u.rate = Number(rate) || (state.mode === "kid" ? 0.72 : 0.88);
        window.speechSynthesis.speak(u);
      }
      function feedback(message, isError, target) {
        var el = document.querySelector(target || "#feedback");
        if (!el) return;
        el.className = "feedback" + (isError ? " error" : "");
        el.innerHTML = message;
      }
      function overlapScore(spoken, target) {
        var a = unique(words(spoken)); var b = unique(words(target));

      }
      function renderHistory() {
        if (!state.history.length) return "";
        return "<h3>最近学习记录</h3><div class=\"history\">" + state.history.slice(-7).map(function (h) {
          return "<div class=\"bar\" style=\"--h:" + Math.max(4, h.total) + "%\"><span></span><small>" + h.total + "</small></div>";
        }).join("") + "</div>";
      }
      function finishDay() {
        var vals = [state.scores.listen || state.scores.read, state.scores.shadow, state.scores.speak, state.scores.write];
        var total = Math.round(vals.reduce(function (a, b) { return a + (b || 0); }, 0) / vals.length);
        state.history.push({ date: new Date().toISOString().slice(0, 10), mode: state.mode, level: lesson().level, topic: lesson().topic, total: total, scores: Object.assign({}, state.scores) });
        state.history = state.history.slice(-60);
        state.streak += 1;
        if (state.mode === "kid" && total >= 80 && state.kidLevel < 3) state.kidLevel += 1;
        if (state.mode === "adult") state.adultDay = (state.adultDay + 1) % adultLessons.length;
        state.customActive = false; resetTraining(); persist(); render();
      }
      function renderReview() {
        panel.innerHTML = "<h2>复习</h2><p class=\"muted\">阅读挑战、重点词和错题会自动收集到这里。</p><div class=\"review-list\" id=\"reviewList\"></div><div class=\"actions\"><button class=\"btn btn-primary\" data-action=\"close-view\">返回训练</button></div>";
        var list = document.getElementById("reviewList");
        if (!state.reviewWords.length) { list.innerHTML = "<div class=\"feedback\">目前没有待复习内容。</div>"; return; }
        state.reviewWords.forEach(function (item, i) {
          list.insertAdjacentHTML("beforeend", "<div class=\"choice\"><div><strong>" + escapeHTML(item.word) + "</strong> - " + escapeHTML(item.meaning) + "<p class=\"muted\">" + escapeHTML(item.example) + " · " + escapeHTML(item.reason) + "</p></div><div class=\"actions\"><button class=\"btn\" data-action=\"play-review\" data-index=\"" + i + "\">发音</button><button class=\"btn\" data-action=\"master-word\" data-index=\"" + i + "\">已掌握</button></div></div>");
        });
      }
      function renderMaterial() {
        panel.innerHTML = "<h2>用自己的英文材料训练</h2><p class=\"muted\">成人模式可粘贴 3-8 句英文，生成听力、阅读挑战、跟读、复述和写作训练。</p><div class=\"grid\"><label class=\"field\">材料主题<input class=\"control\" id=\"materialTopic\" placeholder=\"例如：AI 项目介绍\"></label><label class=\"field\">英文标题<input class=\"control\" id=\"materialTitle\" placeholder=\"例如：My AI Project\"></label></div><label class=\"field\" style=\"margin-top:12px\">英文内容<textarea class=\"control\" id=\"materialText\" placeholder=\"Paste 3-8 complete English sentences here...\"></textarea></label><label class=\"field\">中文参考，可选<textarea class=\"control\" id=\"materialCn\" placeholder=\"可留空\"></textarea></label><div class=\"actions\"><button class=\"btn btn-primary\" data-action=\"build-material\">生成今日训练</button><button class=\"btn\" data-action=\"close-view\">返回</button></div><div id=\"feedback\"></div>";
      }
      function buildMaterial() {
        var topic = document.getElementById("materialTopic").value.trim() || "自定义材料";
        var title = document.getElementById("materialTitle").value.trim() || "My English Practice";
        var text = document.getElementById("materialText").value.trim();
        var cn = document.getElementById("materialCn").value.trim();
        var sentences = (text.match(/[^.!?]+[.!?]+|[^.!?]+$/g) || []).map(function (s) { return s.trim(); }).filter(Boolean).slice(0, 8);
        if (sentences.length < 3) { feedback("请至少粘贴 3 个完整英文句子。", true); return; }
        var stop = ["about", "after", "again", "before", "could", "every", "their", "there", "these", "they", "this", "those", "which", "would", "should", "with", "from", "have", "that", "your", "into", "when", "where"];
        var allWords = unique(words(text).filter(function (w) { return w.length >= 5 && stop.indexOf(w) < 0; }));
        if (allWords.length < 3) allWords = unique(words(text).filter(function (w) { return w.length >= 4; }));
        var keywords = allWords.slice(0, 6);
        var translations = cn ? cn.split(/[。！？.!?]+/).map(function (s) { return s.trim(); }).filter(Boolean) : [];
        while (translations.length < sentences.length) translations.push("请结合上下文理解。");
        var questions = sentences.slice(0, 3).map(function (sentence, index) {
          var answer = words(sentence).filter(function (w) { return w.length >= 5 && stop.indexOf(w) < 0; })[0] || words(sentence)[0] || "English";
          var alts = allWords.filter(function (w) { return w.toLowerCase() !== answer.toLowerCase(); }).slice(index, index + 2);
          while (alts.length < 2) alts.push(alts.length ? "example" : "different");
          return [sentence.replace(new RegExp("\\b" + answer + "\\b", "i"), "___"), [answer, alts[0], alts[1]], 0];
        });
        state.customLesson = { mode: "adult", topic: topic, title: title, level: state.profile ? state.profile.level : "A2 入门", sentences: sentences, translations: translations.slice(0, sentences.length), vocab: keywords.slice(0, 4).map(function (w) { return [w, "自定义重点词", sentences.find(function (s) { return s.toLowerCase().indexOf(w) >= 0; }) || sentences[0]]; }), questions: questions, speakPrompt: "Summarize the main idea in your own words.", keywords: keywords, writePrompt: "Write 50-100 words about the same topic using at least three key words." };
        state.customActive = true; state.view = "lesson"; resetTraining(); persist(); render();
      }
      function exportProgress() {
        var blob = new Blob([localStorage.getItem(STORAGE_KEY) || "{}"], { type: "application/json" });
        var url = URL.createObjectURL(blob);
        var a = document.createElement("a"); a.href = url; a.download = "english-coach-progress.json"; a.click();
        URL.revokeObjectURL(url);
      }
      function importProgress(file) {
        if (!file) return;
        var reader = new FileReader();
        reader.onload = function () {
          try {
            var data = JSON.parse(String(reader.result || "{}"));
            if (!data.profile || !Array.isArray(data.history) || !Array.isArray(data.reviewWords)) throw new Error("invalid");
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); saved = data; location.reload();
          } catch (_) { feedback("进度文件无法识别，请选择本工具导出的 JSON 文件。", true); }
        };
        reader.readAsText(file);
      }
      async function requestAICoach(type, answer, target, button) {
        if (!answer || words(answer).length < 5) { feedback("请先完成英文回答，再使用 AI 深度点评。", true, target); return; }
        var original = button.textContent; button.disabled = true; button.textContent = "AI 正在分析...";
        var code = localStorage.getItem("english-coach-access-code") || "";
        var payload = { type: type, answer: answer, prompt: type === "speaking" ? lesson().speakPrompt : lesson().writePrompt, reference: lesson().sentences.join(" "), level: state.profile ? state.profile.level : lesson().level, topic: lesson().topic };
        async function send(c) { return fetch("/api/coach", { method: "POST", headers: { "content-type": "application/json", "x-app-code": c }, body: JSON.stringify(payload) }); }
        try {
          var res = await send(code);
          if (res.status === 401) { code = window.prompt("请输入在线版访问码") || ""; if (code) localStorage.setItem("english-coach-access-code", code); res = await send(code); }
          var data = await res.json();
          if (!res.ok) throw new Error(data.error || "AI 服务暂时不可用");
          var f = data.feedback || {};
          document.querySelector(target).className = "feedback";
          document.querySelector(target).innerHTML = "<strong>AI 综合评分：" + escapeHTML(f.score) + "</strong><br><p>" + escapeHTML(f.summary || "") + "</p><strong>更自然表达</strong><p>" + escapeHTML(f.improved_answer || "") + "</p><strong>下一步</strong><p>" + escapeHTML(f.next_action || "") + "</p>";
          if (type === "speaking") state.scores.speak = Number(f.score) || state.scores.speak;
          if (type === "writing") state.scores.write = Number(f.score) || state.scores.write;
        } catch (e) {
          feedback("AI 服务未连接或暂时不可用，已保留本地评分。提示：" + escapeHTML(e.message), true, target);
        } finally { button.disabled = false; button.textContent = original; }
      }
      async function checkAIHealth() {
        try {
          var res = await fetch("/api/health"); var data = await res.json();
          document.getElementById("aiBadge").textContent = data.aiConfigured ? "AI 已连接" : "本地模式";
        } catch (_) { document.getElementById("aiBadge").textContent = "本地模式"; }
      }
      function goStep(next) { state.step = clamp(next, 0, 5); state.view = "lesson"; render(); }
      function render() {
        renderShell();
        if (state.view === "setup") renderSetup();
        else if (state.view === "assessment") renderAssessment();
        else if (state.view === "review") renderReview();
        else if (state.view === "material") renderMaterial();
        else if (state.step === 0) renderListen();
        else if (state.step === 1) renderRead();
        else if (state.step === 2) renderShadow();
        else if (state.step === 3) renderSpeak();
        else if (state.step === 4) renderWrite();
        else renderReport();
        renderShell();
      }
      document.addEventListener("click", function (event) {
        var button = event.target.closest("button");
        if (!button) return;
        var a = button.dataset.action;
        if (a === "set-mode") setMode(button.dataset.mode);
        if (a === "settings") { state.view = "setup"; render(); }
        if (a === "save-settings") saveSettings();
        if (a === "cancel-settings" || a === "close-view") { state.view = "lesson"; render(); }
        if (a === "review") { state.view = "review"; render(); }
        if (a === "material") { state.view = "material"; render(); }
        if (a === "go-step") goStep(Number(button.dataset.step));
        if (a === "start-assessment") startAssessment();
        if (a === "submit-assessment") submitAssessment();
        if (a === "play-all") { speak(lesson().sentences.join(" "), document.getElementById("rate") ? document.getElementById("rate").value : undefined); state.playCount += 1; if (document.getElementById("playCount")) document.getElementById("playCount").textContent = "已播放 " + state.playCount + " 次"; }
        if (a === "play-sentence") speak(lesson().sentences[state.shadowIndex], state.mode === "kid" ? 0.68 : 0.78);
        if (a === "submit-answer") submitAnswer();
        if (a === "advance-question") advanceQuestion();
        if (a === "toggle-translation") { state.showTranslation = !state.showTranslation; renderRead(); }
        if (a === "show-vocab") showVocab(Number(button.dataset.index));
        if (a === "next-step") goStep(state.step + 1);
        if (a === "record-shadow") startRecording(button, document.getElementById("shadowText"));
        if (a === "score-shadow") scoreShadow();
        if (a === "next-sentence") nextSentence();
        if (a === "record-speak") startRecording(button, document.getElementById("speakText"));
        if (a === "score-speak") scoreSpeak();
        if (a === "score-write") scoreWrite();
        if (a === "ai-speak") requestAICoach("speaking", document.getElementById("speakText").value.trim(), "#aiFeedback", button);
        if (a === "ai-write") requestAICoach("writing", document.getElementById("writeText").value.trim(), "#aiFeedback", button);
        if (a === "finish-day") finishDay();
        if (a === "restart-day") { resetTraining(); render(); }
        if (a === "play-review") speak(state.reviewWords[Number(button.dataset.index)].word, 0.72);
        if (a === "master-word") { state.reviewWords.splice(Number(button.dataset.index), 1); persist(); render(); }
        if (a === "export") exportProgress();
        if (a === "choose-import") document.getElementById("importFile").click();
        if (a === "build-material") buildMaterial();
      });
      document.addEventListener("input", function (event) {
        if (event.target.id === "writeText") document.getElementById("wordCount").textContent = words(event.target.value).length + " words";
      });
      document.addEventListener("change", function (event) {
        if (event.target.id === "importFile") importProgress(event.target.files && event.target.files[0]);
      });
      render();
      checkAIHealth();
    })();
  </script>
</body>
</html>
